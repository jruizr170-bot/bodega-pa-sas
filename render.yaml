services:
  - type: web
    name: bodega-pa-sas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bodega-pa-sas-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: bodega-pa-sas-db
    databaseName: bodega_pa_sas
    user: bodega_user
    plan: free
